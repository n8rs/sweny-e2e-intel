name: SWEny Triage
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Run SWEny triage
        uses: swenyai/sweny@v5
        with:
          workflow: .sweny/workflows/triage.yml
          claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - name: Probe /api/report with manual OIDC
        if: always()
        run: |
          set -u
          AUD="https://cloud.sweny.ai"
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUD" | python3 -c 'import json,sys; print(json.load(sys.stdin)["value"])')
          echo "token length: ${#TOKEN}"
          echo "token header decoded:"
          echo "$TOKEN" | cut -d. -f1 | base64 -d 2>/dev/null | python3 -c 'import json,sys; print(json.dumps(json.load(sys.stdin), indent=2))' || true
          echo "token payload decoded:"
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          # pad base64
          PAYLOAD="$PAYLOAD$(python3 -c "print('='*((4-len('$PAYLOAD')%4)%4),end='')")"
          echo "$PAYLOAD" | base64 -d 2>/dev/null | python3 -c 'import json,sys; print(json.dumps(json.load(sys.stdin), indent=2))' || true
          echo "---"
          echo "POST /api/report:"
          curl -sS -v -X POST "$AUD/api/report" \
            -H "content-type: application/json" \
            -H "authorization: Bearer $TOKEN" \
            -d '{"owner":"n8rs","repo":"sweny-e2e-intel","workflow":"diagnostic","status":"completed","findings":[]}' 2>&1 | tail -50
