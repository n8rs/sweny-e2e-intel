id: triage
name: Minimal Code Triage
description: Scan source files for code issues and produce findings for cloud reporting
entry: gather
nodes:
  gather:
    name: Gather Context
    instruction: |
      Read the source files under `src/**/*.js` in this repository.

      For each file:
      - Summarize what the code does.
      - Note any obvious bugs, security issues, or code-quality smells.

      Use the github skill's repo-read tools; do NOT open issues or PRs in this node.
    skills:
      - github
    next:
      - investigate
  investigate:
    name: Investigate & Classify
    instruction: |
      Based on the gather step, identify every distinct code-quality, correctness,
      or security issue you found. For each issue produce a finding with:

      - `title`: concise one-line summary
      - `root_cause`: what's wrong and why it's wrong
      - `severity`: one of `critical`, `high`, `medium`, `low`
      - `affected_services`: list of filenames or module names
      - `is_duplicate`: always `false` for this project (no issue tracker connected)
      - `fix_approach`: one-sentence description of the fix
      - `fix_complexity`: one of `simple`, `moderate`, `complex`

      Output:
      - `findings`: array of all findings
      - `novel_count`: count of findings where is_duplicate == false
      - `highest_severity`: highest severity across all findings
      - `recommendation`: one of `implement` (ready to fix), `skip` (not worth it), `escalate` (human needed)

      Do NOT create issues or PRs — this project has no issue tracker wired up. Just classify.
    skills:
      - github
    output:
      type: object
      properties:
        findings:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              root_cause: { type: string }
              severity:
                type: string
                enum: [critical, high, medium, low]
              affected_services:
                type: array
                items: { type: string }
              is_duplicate: { type: boolean }
              fix_approach: { type: string }
              fix_complexity:
                type: string
                enum: [simple, moderate, complex]
            required: [title, root_cause, severity, is_duplicate]
        novel_count: { type: number }
        highest_severity:
          type: string
          enum: [critical, high, medium, low]
        recommendation: { type: string }
      required: [findings, novel_count, highest_severity, recommendation]
